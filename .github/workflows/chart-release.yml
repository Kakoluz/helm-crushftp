name: Release Helm Chart

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example v1.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: chart-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_tag.outputs.value }}
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        id: package
        run: |
          mkdir -p /tmp/charts
          helm package charts/crushftp --destination /tmp/charts

          pkg_path="$(ls /tmp/charts/crushftp-*.tgz | head -n 1)"
          chart_version="$(basename "$pkg_path" | sed -E 's/^crushftp-(.*)\.tgz$/\1/')"
          tag_version="${{ steps.release_tag.outputs.value }}"
          tag_version="${tag_version#v}"

          if [ "$chart_version" != "$tag_version" ]; then
            echo "Tag version ($tag_version) does not match chart version ($chart_version)."
            exit 1
          fi

          echo "path=$pkg_path" >> "$GITHUB_OUTPUT"
          echo "version=$chart_version" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          files: ${{ steps.package.outputs.path }}
          generate_release_notes: true

      - name: Checkout main branch for index update
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: Update Helm repository index
        run: |
          temp_chart="docs/crushftp-${{ steps.package.outputs.version }}.tgz"
          cp "${{ steps.package.outputs.path }}" "$temp_chart"

          helm repo index docs \
            --url "https://github.com/${{ github.repository }}/releases/download/${{ steps.release_tag.outputs.value }}" \
            --merge docs/index.yaml

          rm -f "$temp_chart"

      - name: Commit and push index changes
        run: |
          if git diff --quiet -- docs/index.yaml; then
            echo "No index changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.yaml
          git commit -m "chore(charts): release crushftp-${{ steps.package.outputs.version }}"
          git push origin HEAD:main

name: Build and Publish CrushFTP Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/crushftp

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read chart appVersion
        id: chart
        run: |
          app_version="$(awk -F': ' '/^appVersion:/ {gsub(/"/, "", $2); print $2; exit}' charts/crushftp/Chart.yaml)"
          major="$(echo "$app_version" | cut -d. -f1)"
          major_minor="$(echo "$app_version" | cut -d. -f1-2)"

          {
            echo "app_version=$app_version"
            echo "major=$major"
            echo "major_minor=$major_minor"
            printf 'tags<<EOF\n'
            printf '%s/%s:latest\n' "${{ env.REGISTRY }}" "${{ env.IMAGE_NAME }}"
            printf '%s/%s:%s\n' "${{ env.REGISTRY }}" "${{ env.IMAGE_NAME }}" "$major"
            printf '%s/%s:%s\n' "${{ env.REGISTRY }}" "${{ env.IMAGE_NAME }}" "$major_minor"
            printf '%s/%s:%s\n' "${{ env.REGISTRY }}" "${{ env.IMAGE_NAME }}" "$app_version"
            printf 'EOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./images/crushftp
          file: ./images/crushftp/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.chart.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

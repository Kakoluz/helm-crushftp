# Default values for crushftp.

# Project specific
admin:
  username: crushadmin
  password: ''
  protocol: http
  port: 8080
tls:
  secretName: crushftp-tls
volumes: [] # Volumes to mount to the image of other sites, etc.
  # - name: another-volume
  #   claimName: another-volume-claim
  #   mountPath: /mnt/FTP/Shared/another-volume
configVolume:
  accessMode: ReadWriteOnce
  size: 8Gi
# Deprecated: use service.loadBalancerIP instead.
loadBalancerIp: ""
features:
  enableFtp: false

# Shared
shared:
  hosts:
    crushFtp:
      root: .local.com
      prefix: ftp
  ingress:
    clusterIssuer: ''
  storageClassName: ""

# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/kakoluz/crushftp
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: LoadBalancer
  port: 80
  # Set only if your cloud/K8s provider supports static LB assignment.
  loadBalancerIP: ""
  externalTrafficPolicy: Cluster

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
